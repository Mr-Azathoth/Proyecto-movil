<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sin conexión — Centrotec</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d1117; color: #e6edf3;
    font-family: 'Inter', system-ui, sans-serif;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh; gap: 16px; padding: 24px; text-align: center;
  }
  .icon { font-size: 56px; }
  h1 { font-size: 20px; font-weight: 700; }
  p  { color: #8b949e; font-size: 14px; max-width: 280px; line-height: 1.5; }
  button {
    margin-top: 8px; padding: 12px 28px;
    background: #7c3aed; color: #fff; border: none;
    border-radius: 10px; font-size: 14px; cursor: pointer;
  }
</style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>Sin conexión</h1>
  <p>Revisa tu conexión a internet e intenta nuevamente.</p>
  <button onclick="location.reload()">Reintentar</button>
</body>
</html>
